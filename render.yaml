# Backend API for the GitHub Pages frontend.
# Deploy: Render dashboard → New → Blueprint → connect jeanmicheltawk/ille
services:
  - type: web
    name: ille-api
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@ille.co
      - key: ADMIN_PASSWORD
        value: illeadmin
