name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build -- --configuration=pages

      # SPA routing on GitHub Pages (refresh on /ille/admin etc.)
      - run: cp dist/ille-angular/browser/index.html dist/ille-angular/browser/404.html
      - run: touch dist/ille-angular/browser/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/ille-angular/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
